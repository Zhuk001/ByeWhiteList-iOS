name: Build iOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install xcodegen
      run: brew install xcodegen
    
    - name: Generate Xcode project
      run: xcodegen generate
    
    - name: Build app
      run: |
        xcodebuild -project ByeWhiteList.xcodeproj \
          -scheme ByeWhiteList \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM="" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build
    
    - name: Create IPA
      run: |
        mkdir -p Payload
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "ByeWhiteList.app" -type d | head -1)
        cp -r "$APP_PATH" Payload/
        zip -r ByeWhiteList.ipa Payload
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ByeWhiteList
        path: ByeWhiteList.ipa
