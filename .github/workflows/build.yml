name: Build iOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode_16.app
    
    - name: Build app
      run: |
        xcodebuild -project ByeWhiteList.xcodeproj \
          -scheme ByeWhiteList \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM="" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build
    
    - name: Find built app
      id: find_app
      run: |
        echo "=== Searching for .app ==="
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "ByeWhiteList.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "App size:"
          du -sh "$APP_PATH"
          echo "App contents (first 10 items):"
          ls -la "$APP_PATH" | head -10
        else
          echo "ERROR: App not found"
          exit 1
        fi
    
    - name: Create Payload
      run: |
        APP_PATH="${{ steps.find_app.outputs.app_path }}"
        echo "Creating Payload from: $APP_PATH"
        mkdir -p Payload
        cp -R "$APP_PATH" Payload/
        echo "Payload contents:"
        ls -la Payload/
        echo "Payload size:"
        du -sh Payload
    
    - name: Create IPA
      run: |
        if [ -d "Payload/ByeWhiteList.app" ]; then
          echo "Payload/ByeWhiteList.app exists"
          ls -la Payload/ByeWhiteList.app/
          echo "Zipping Payload..."
          zip -r ByeWhiteList.ipa Payload
          echo "IPA created, size:"
          ls -la ByeWhiteList.ipa
        else
          echo "ERROR: Payload/ByeWhiteList.app not found"
          echo "Current directory contents:"
          ls -la
          exit 1
        fi
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ByeWhiteList
        path: ByeWhiteList.ipa
      if: success() || failure()